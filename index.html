<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dayzee - MUJI STYLE</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- MUJI风格背景 -->
  <div class="muji-bg">
    <div class="paper-texture"></div>
  </div>

  <!-- 页面容器 -->
  <div class="page-container">
    <!-- 页面1: 心情选择页 -->
    <div id="page-mood" class="page active">
      <div class="muji-header">
        <div class="muji-logo">
          <span class="logo-text">DAYZEE</span>
          <span class="logo-sub">MOMENT TRACKER</span>
        </div>
        <div class="status-line">
          <span class="status-dot"></span>
          <span class="status-text">ONLINE</span>
        </div>
      </div>

      <div class="mood-page-content">
        <div class="title-section">
          <h1 class="main-title">DAYZEE</h1>
          <p class="sub-title">今日心情</p>
          <div class="title-border"></div>
        </div>

        <div class="mood-selector">
          <div class="mood-card" data-mood="happy">
            <div class="mood-icon">😊</div>
            <div class="mood-label">HAPPY</div>
            <div class="mood-desc">积极状态</div>
            <div class="mood-glow"></div>
          </div>

          <div class="mood-card" data-mood="bored">
            <div class="mood-icon">😐</div>
            <div class="mood-label">BORED</div>
            <div class="mood-desc">平淡状态</div>
            <div class="mood-glow"></div>
          </div>

          <div class="mood-card" data-mood="low">
            <div class="mood-icon">😔</div>
            <div class="mood-label">LOW</div>
            <div class="mood-desc">低落状态</div>
            <div class="mood-glow"></div>
          </div>

          <div class="mood-card" data-mood="excited">
            <div class="mood-icon">🤩</div>
            <div class="mood-label">EXCITED</div>
            <div class="mood-desc">兴奋状态</div>
            <div class="mood-glow"></div>
          </div>
        </div>

        <div class="proceed-section">
          <button id="proceed-btn" class="proceed-btn disabled">
            <span class="btn-text">开始</span>
            <span class="btn-arrow">→</span>
          </button>
          <p class="proceed-hint">请先选择您的心情</p>
        </div>

        <div class="footer-info">
          <span class="info-text">Dayzee v1.0.0</span>
          <span class="info-divider">|</span>
          <span class="info-text">Simple Life</span>
        </div>
      </div>
    </div>

    <!-- 页面2: Bingo棋盘页 -->
    <div id="page-bingo" class="page">
      <div class="muji-header">
        <button id="back-btn" class="back-btn">
          <span>← 返回</span>
        </button>
        <div class="muji-logo">
          <span class="logo-text">BINGO</span>
          <span class="logo-sub">TODAY</span>
        </div>
        <div class="status-line">
          <span class="status-dot active"></span>
          <span class="status-text">ACTIVE</span>
        </div>
      </div>

      <div class="bingo-page-content">
        <!-- 状态栏 -->
        <div class="mission-status">
          <div class="status-item">
            <span class="status-label">日期</span>
            <span class="status-value" id="current-date">2024.01.01</span>
          </div>
          <div class="status-item">
            <span class="status-label">心情</span>
            <span class="status-value mood-badge" id="current-mood">HAPPY</span>
          </div>
          <div class="status-item">
            <span class="status-label">BINGO</span>
            <span class="status-value highlight" id="bingo-count">0</span>
          </div>
          <div class="status-item">
            <span class="status-label">进度</span>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>
        </div>

        <!-- Bingo棋盘 -->
        <div class="bingo-container">
          <div class="section-title">
            <span class="title-icon">🎯</span>
            <span class="title-text">今日任务</span>
            <div class="title-bar"></div>
          </div>

          <div class="bingo-board" id="bingo-board">
            <!-- 动态生成 -->
          </div>

          <div class="bingo-indicators">
            <div class="indicator-row">
              <div class="indicator" id="h1"></div>
              <div class="indicator" id="h2"></div>
              <div class="indicator" id="h3"></div>
            </div>
            <div class="indicator-row">
              <div class="indicator" id="v1"></div>
              <div class="indicator" id="d1"></div>
              <div class="indicator" id="d2"></div>
              <div class="indicator" id="v3"></div>
            </div>
            <div class="indicator-row">
              <div class="indicator" id="v2"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 任务详情弹窗 -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">任务详情</span>
        <button class="close-btn" id="close-modal">×</button>
      </div>
      <div class="modal-body">
        <div class="task-icon-large" id="task-icon">🎲</div>
        <h3 class="task-title" id="task-title">任务标题</h3>
        <p class="task-desc" id="task-desc">任务描述</p>
      </div>
      <div class="modal-footer">
        <button class="action-btn cancel" id="cancel-task">取消</button>
        <button class="action-btn confirm" id="complete-task">完成</button>
      </div>
    </div>
  </div>

  <!-- 奇遇卡弹窗 -->
  <div class="modal-overlay" id="moment-modal">
    <div class="modal-content moment-card">
      <div class="modal-header">
        <span class="modal-title">奇遇卡片</span>
        <button class="close-btn" id="close-moment">×</button>
      </div>
      <div class="moment-content">
        <div class="moment-icon" id="moment-icon">✨</div>
        <h3 class="moment-title" id="moment-title">奇遇时刻</h3>
        <div class="moment-narrative" id="moment-narrative">
          AI生成的生活叙事...
        </div>
        <div class="moment-meta">
          <span class="meta-item" id="moment-date">日期</span>
          <span class="meta-item" id="moment-mood">心情</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn share" id="share-moment">分享</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

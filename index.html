<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dayzee - 今天来点啥</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div class="game-container">
    <!-- 顶部状态栏 -->
    <header class="status-bar">
      <div class="status-item">
        <span class="icon">💎</span>
        <span class="value">Dayzee</span>
      </div>
      <div class="status-item">
        <span class="icon">📅</span>
        <span class="value" id="current-date">2024年1月1日</span>
      </div>
      <div class="status-item">
        <span class="icon">🏆</span>
        <span class="value" id="bingo-count">0 Bingo!</span>
      </div>
    </header>

    <!-- 心情选择 -->
    <div class="mood-section">
      <h3 class="pixel-title">🎮 今天心情如何？</h3>
      <div class="mood-buttons">
        <button class="mood-btn" data-mood="happy">😊 开心</button>
        <button class="mood-btn" data-mood="bored">😐 无聊</button>
        <button class="mood-btn" data-mood="low">😔 低落</button>
        <button class="mood-btn" data-mood="excited">🤩 兴奋</button>
      </div>
    </div>

    <!-- Bingo棋盘 -->
    <div class="bingo-section">
      <h3 class="pixel-title">🎯 今日生活Bingo</h3>
      <div class="bingo-board" id="bingo-board">
        <!-- 动态生成9宫格 -->
      </div>
      <div class="bingo-indicators">
        <div class="indicator" id="indicator-h1">⬜</div>
        <div class="indicator" id="indicator-h2">⬜</div>
        <div class="indicator" id="indicator-h3">⬜</div>
        <div class="indicator" id="indicator-v1">⬜</div>
        <div class="indicator" id="indicator-v2">⬜</div>
        <div class="indicator" id="indicator-v3">⬜</div>
        <div class="indicator" id="indicator-d1">⬜</div>
        <div class="indicator" id="indicator-d2">⬜</div>
      </div>
    </div>

    <!-- 任务详情弹窗 -->
    <div class="modal-overlay" id="task-modal">
      <div class="modal-content pixel-card">
        <span class="close-btn" id="close-modal">✕</span>
        <div class="task-icon" id="task-icon">🎲</div>
        <h3 class="task-title" id="task-title">任务标题</h3>
        <p class="task-description" id="task-description">任务描述</p>
        
        <div class="timer-section">
          <span class="timer-label">⏱️ 计时</span>
          <span class="timer-display" id="timer">00:00</span>
          <button class="timer-btn" id="start-timer">开始计时</button>
          <button class="timer-btn" id="stop-timer">停止计时</button>
        </div>

        <div class="task-form">
          <textarea id="task-note" placeholder="记录你的感受..."></textarea>
          <div class="upload-section">
            <label class="upload-btn">
              📷 上传照片
              <input type="file" accept="image/*" id="photo-upload">
            </label>
            <img id="preview-image" src="" alt="预览" style="display:none;">
          </div>
          <button class="complete-btn" id="complete-task">✅ 完成任务</button>
        </div>
      </div>
    </div>

    <!-- 成就弹窗 -->
    <div class="modal-overlay" id="achievement-modal">
      <div class="modal-content pixel-card achievement-card">
        <div class="achievement-icon" id="achievement-icon">🎉</div>
        <h2 class="achievement-title" id="achievement-title">Bingo!</h2>
        <p class="achievement-desc" id="achievement-desc">恭喜达成成就！</p>
        <div class="badge-display" id="badge-display"></div>
        <button class="close-btn" id="close-achievement">继续游戏</button>
      </div>
    </div>

    <!-- 奇遇卡弹窗 -->
    <div class="modal-overlay" id="moment-modal">
      <div class="modal-content pixel-card moment-card">
        <span class="close-btn" id="close-moment">✕</span>
        <div class="moment-header">
          <span class="moment-icon" id="moment-icon">✨</span>
          <h3 class="moment-title" id="moment-title">奇遇时刻</h3>
        </div>
        <div class="moment-photo" id="moment-photo"></div>
        <p class="moment-narrative" id="moment-narrative">AI生成的生活叙事...</p>
        <div class="moment-meta">
          <span class="moment-date" id="moment-date"></span>
          <span class="moment-mood" id="moment-mood"></span>
        </div>
        <button class="share-btn" id="share-moment">📤 分享奇遇卡</button>
      </div>
    </div>

    <!-- 成就徽章展示 -->
    <div class="badges-section">
      <h3 class="pixel-title">🏅 我的徽章</h3>
      <div class="badges-grid" id="badges-grid">
        <!-- 动态生成徽章 -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
